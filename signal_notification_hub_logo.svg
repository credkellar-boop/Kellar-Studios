<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="signalGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="hubToWebhook" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="hubToDiscord" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <linearGradient id="hubToAPI" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <g stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.15">
    <circle cx="250" cy="220" r="45" stroke-dasharray="4 8"/>
    <circle cx="250" cy="220" r="90" />
    <circle cx="250" cy="220" r="140" stroke-dasharray="12 6"/>
  </g>

  <g stroke-width="4" stroke-linecap="round">
    <line x1="250" y1="220" x2="140" y2="120" stroke="url(#hubToWebhook)" stroke-dasharray="6 4"/>
    <line x1="250" y1="220" x2="250" y2="85" stroke="url(#hubToDiscord)" />
    <line x1="250" y1="220" x2="360" y2="120" stroke="url(#hubToAPI)" stroke-dasharray="6 4"/>
  </g>

  <g transform="translate(140, 120)">
    <circle cx="0" cy="0" r="22" fill="#0F172A" stroke="#0EA5E9" stroke-width="2.5"/>
    <path d="M-8,-4 L-4,-4 M-4,-4 L-4,4 M-4,4 L-8,4 M8,-4 L4,-4 M4,-4 L4,4 M4,4 L8,4" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" fill="none"/> <circle cx="0" cy="0" r="4" fill="#38BDF8" filter="url(#signalGlow)"/>
  </g>

  <g transform="translate(250, 85)">
    <circle cx="0" cy="0" r="24" fill="#0F172A" stroke="#6366F1" stroke-width="2.5" filter="url(#signalGlow)"/>
    <path d="M-10,-5 C-10,-5 -5,-9 0,-9 C5,-9 10,-5 10,-5 L8,7 L-8,7 Z" fill="none" stroke="#6366F1" stroke-width="2"/> <circle cx="0" cy="0" r="5" fill="#6366F1" filter="url(#signalGlow)"/>
  </g>

  <g transform="translate(360, 120)">
    <circle cx="0" cy="0" r="22" fill="#0F172A" stroke="#10B981" stroke-width="2.5"/>
    <path d="M-6,-6 L6,6 M6,-6 L-6,6" stroke="#10B981" stroke-width="2" stroke-linecap="round"/> <circle cx="0" cy="0" r="4" fill="#10B981" filter="url(#signalGlow)"/>
  </g>

  <g transform="translate(250, 220)" filter="url(#signalGlow)">
    <polygon points="0,-35 30,-15 30,15 0,35 -30,15 -30,-15" fill="#0F172A" stroke="#0EA5E9" stroke-width="3"/>
    <polygon points="0,-18 15,-7 15,7 0,18 -15,7 -15,-7" fill="url(#hubToDiscord)"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
  </g>

  <g transform="translate(130, 290)">
    <rect width="240" height="70" rx="6" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <text x="15" y="25" font-family="monospace" font-size="11" fill="#6366F1">[DISCORD] Bot Status: ONLINE</text>
    <text x="15" y="45" font-family="monospace" font-size="11" fill="#10B981">[WEBHOOK] Status 200 OK</text>
  </g>

  <text x="135" y="385" font-family="monospace" font-size="10" font-weight="bold" fill="#64748B">ROUTING: DYNAMIC</text>
  <text x="365" y="385" font-family="monospace" font-size="10" font-weight="bold" fill="#10B981" text-anchor="end">STREAM: ACTIVE</text>

  <text x="250" y="440" font-family="monospace" font-size="12" font-weight="bold" fill="#475569" letter-spacing="5" text-anchor="middle">NOTIFIER_HUB // MULTI_CHANNEL</text>
</svg>
