<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="coreGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="highPriorityGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="ingestionPath" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <linearGradient id="aiPath" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <linearGradient id="governancePath" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="centralHubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="50%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <g stroke="#1E293B" stroke-width="1" fill="none" opacity="0.3">
    <circle cx="250" cy="220" r="180" stroke-dasharray="4 8"/>
    <circle cx="250" cy="220" r="130" />
    <circle cx="250" cy="220" r="80" stroke-dasharray="12 6"/>
    <line x1="40" y1="220" x2="460" y2="220" />
    <line x1="250" y1="20" x2="250" y2="400" />
    <line x1="90" y1="60" x2="410" y2="380" stroke-dasharray="2 4"/>
    <line x1="90" y1="380" x2="410" y2="60" stroke-dasharray="2 4"/>
  </g>

  <g transform="translate(30, 25)" font-family="monospace" font-size="10" font-weight="bold">
    <rect x="0" y="0" width="105" height="20" rx="4" fill="#0F172A" stroke="#10B981" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="3.5" fill="#10B981" filter="url(#coreGlow)"/>
    <text x="22" y="13" fill="#10B981">SYSTEM: RUNNING</text>

    <rect x="115" y="0" width="85" height="20" rx="4" fill="#0F172A" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="127" y="13" fill="#0EA5E9">PM2: ACTIVE</text>

    <rect x="310" y="0" width="130" height="20" rx="4" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
    <text x="322" y="13" fill="#94A3B8">INTEGRITY: SECURE</text>
  </g>

  <path d="M 250,220 L 140,130" fill="none" stroke="url(#ingestionPath)" stroke-width="5" stroke-linecap="round" filter="url(#coreGlow)"/>
  <path d="M 250,220 L 360,130" fill="none" stroke="url(#aiPath)" stroke-width="5" stroke-linecap="round" filter="url(#coreGlow)"/>
  <path d="M 250,220 L 250,330" fill="none" stroke="url(#governancePath)" stroke-width="5" stroke-linecap="round" filter="url(#coreGlow)"/>

  <g transform="translate(140, 130)">
    <circle cx="0" cy="0" r="26" fill="#0F172A" stroke="#0EA5E9" stroke-width="2.5"/>
    <path d="M-8,-6 L0,2 L8,-6 M-8,2 L0,10 L8,2" fill="none" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="-35" y="-12" font-family="monospace" font-size="9" font-weight="bold" fill="#0EA5E9">Z_01: INGEST</text>
  </g>

  <g transform="translate(360, 130)">
    <circle cx="0" cy="0" r="26" fill="#0F172A" stroke="#A855F7" stroke-width="2.5"/>
    <circle cx="-6" cy="-6" r="3" fill="#A855F7"/>
    <circle cx="6" cy="-6" r="3" fill="#A855F7"/>
    <circle cx="0" cy="8" r="4" fill="#6366F1" filter="url(#coreGlow)"/>
    <line x1="-4" y1="-3" x2="-1" y2="5" stroke="#A855F7" stroke-width="1.5"/>
    <line x1="4" y1="-3" x2="1" y2="5" stroke="#A855F7" stroke-width="1.5"/>
    <text x="35" y="-12" font-family="monospace" font-size="9" font-weight="bold" fill="#A855F7" text-anchor="end">Z_02: AI_BRAIN</text>
  </g>

  <g transform="translate(250, 330)">
    <polygon points="0,-26 24,-12 24,14 0,28 -24,14 -24,-12" fill="#0F172A" stroke="#10B981" stroke-width="2.5"/>
    <path d="M-10,-6 L0,-14 L10,-6 L10,4 C10,10 0,16 0,16 C0,16 -10,10 -10,4 Z" fill="none" stroke="#10B981" stroke-width="2"/>
    <text x="0" y="42" font-family="monospace" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">Z_03: GOVERNANCE</text>
  </g>

  <g transform="translate(250, 220)">
    <circle cx="0" cy="0" r="42" fill="#090D16" stroke="#334155" stroke-width="4"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#centralHubGrad)" stroke-width="5" stroke-dasharray="45 15" filter="url(#coreGlow)"/>
    <polygon points="0,-14 12,-5 12,9 0,18 -12,9 -12,-5" fill="#FFFFFF" filter="url(#highPriorityGlow)"/>
    <polygon points="0,-14 12,-5 12,9 0,18 -12,9 -12,-5" fill="url(#centralHubGrad)"/>
    <circle cx="0" cy="2" r="3" fill="#FFFFFF"/>
  </g>

  <path d="M 435,335 L 455,335 L 455,355" fill="none" stroke="#EF4444" stroke-width="2"/>
  <circle cx="435" cy="335" r="3" fill="#EF4444" filter="url(#coreGlow)"/>
  <text x="450" y="325" font-family="monospace" font-size="9" font-weight="bold" fill="#EF4444" text-anchor="end">E_STOP: ARMED</text>

  <g transform="translate(250, 455)" font-family="monospace" text-anchor="middle">
    <text x="0" y="0" font-size="15" font-weight="900" fill="#FFFFFF" letter-spacing="6">KELLAR-STUDIO</text>
    <text x="2" y="16" font-size="11" font-weight="bold" fill="#475569" letter-spacing="4">COMMAND // CENTER_CORE</text>
  </g>
</svg>
