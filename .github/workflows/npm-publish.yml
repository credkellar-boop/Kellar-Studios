name: Kellar-Studio Master Deployment

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # This ensures we are inside the nested directory where your files actually live
    defaults:
      run:
        working-directory: ./Kellar-Studios 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install Dependencies
        run: npm install

      - name: Pre-Flight Integrity Check
        run: node 45_environment_validator.js

      - name: Sync Security Vault
        env:
          DOTENV_VAULT: ${{ secrets.DOTENV_VAULT }}
        run: node 48_vault_security_sync.js

      - name: Orchestrate Deployment
        run: node 41_pipeline_controller.js
