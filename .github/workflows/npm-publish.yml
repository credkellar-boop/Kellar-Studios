name: Kellar-Studio Master Deployment

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Pre-Flight Integrity Check
        run: |
          npm install
          node 45_environment_validator.js # Run your script 45 here

      - name: Sync Security Vault
        env:
          DOTENV_VAULT: ${{ secrets.DOTENV_VAULT }}
        run: node 48_vault_security_sync.js # Run your script 48 here

      - name: Publish and Deploy
        run: |
          npm publish
          pm2 restart kellar-pipeline --update-env # Final trigger for your studio heartbeat
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
