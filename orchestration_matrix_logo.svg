<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%" height="100%">
  <defs>
    <!-- Glow Filters -->
    <filter id="neonGlowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="neonGlowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="registryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
  </defs>

  <!-- Dark Tech Background Layer -->
  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <!-- Isometric Grid/Floor Lines (Data Matrix Floor) -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <path d="M 100,350 L 700,650 M 100,450 L 500,650 M 100,250 L 700,550 M 300,150 L 700,350" />
    <path d="M 700,350 L 100,650 M 700,450 L 300,650 M 700,250 L 100,550 M 500,150 L 100,350" />
  </g>

  <!-- Topology Data Stream Pipelines (Z: Base to Hub) -->
  <g stroke-width="3" stroke-linecap="round" opacity="0.8">
    <!-- Controller to Registry Main Bus -->
    <line x1="400" y1="180" x2="400" y2="340" stroke="#34D399" filter="url(#neonGlowEmerald)" stroke-dasharray="8 4"/>
    
    <!-- Registry to Workers Splines -->
    <path d="M 400,380 Q 250,420 200,480" fill="none" stroke="#38BDF8" filter="url(#neonGlowCyan)"/>
    <path d="M 400,380 Q 400,440 400,540" fill="none" stroke="#38BDF8" filter="url(#neonGlowCyan)"/>
    <path d="M 400,380 Q 550,420 600,480" fill="none" stroke="#38BDF8" filter="url(#neonGlowCyan)"/>
  </g>

  <!-- TIER 1: THE CONTROLLER node (41_pipeline_controller.js) -->
  <g transform="translate(400, 140)">
    <!-- 3D Top Glass Face -->
    <polygon points="0,-40 70,-10 0,20 -70,-10" fill="url(#controllerGrad)" filter="url(#neonGlowEmerald)" opacity="0.9"/>
    <!-- 3D Left Face -->
    <polygon points="-70,-10 0,20 0,60 -70,30" fill="#047857" />
    <!-- 3D Right Face -->
    <polygon points="0,20 70,-10 70,20 0,60" fill="#065F46" />
    <text x="0" y="-50" font-family="monospace" font-size="14" font-weight="bold" fill="#34D399" text-anchor="middle">CTRLR [41]</text>
  </g>

  <!-- TIER 2: THE REGISTRY MATRIX (43_dynamic_registry.js) -->
  <g transform="translate(400, 360)">
    <!-- Outer Floating Ring Structure -->
    <polygon points="0,-60 120,-10 0,40 -120,-10" fill="none" stroke="url(#registryGrad)" stroke-width="6" filter="url(#neonGlowCyan)"/>
    <!-- Inner Core Hub -->
    <polygon points="0,-25 45,-5 0,15 -45,-5" fill="#0C4A6E" stroke="#38BDF8" stroke-width="2"/>
    <polygon points="-45,-5 0,15 0,35 -45,15" fill="#0369A1" />
    <polygon points="0,15 45,-5 45,15 0,35" fill="#0C4A6E" />
    <text x="140" y="-10" font-family="monospace" font-size="14" font-weight="bold" fill="#38BDF8">REGISTRY [43]</text>
  </g>

  <!-- TIER 3: THE AUTOMATED WORKERS (Ecosystem Swarm) -->
  <!-- Left Worker -->
  <g transform="translate(200, 500)">
    <polygon points="0,-20 35,-5 0,10 -35,-5" fill="url(#workerGrad)" />
    <polygon points="-35,-5 0,10 0,25 -35,10" fill="#334155" />
    <polygon points="0,10 35,-5 35,10 0,25" fill="#1E293B" />
    <text x="-45" y="5" font-family="monospace" font-size="12" fill="#94A3B8" text-anchor="end">WRKR_A</text>
  </g>

  <!-- Center Worker -->
  <g transform="translate(400, 560)">
    <polygon points="0,-20 35,-5 0,10 -35,-5" fill="url(#workerGrad)" />
    <polygon points="-35,-5 0,10 0,25 -35,10" fill="#334155" />
    <polygon points="0,10 35,-5 35,10 0,25" fill="#1E293B" />
    <text x="0" y="45" font-family="monospace" font-size="12" fill="#94A3B8" text-anchor="middle">WRKR_B</text>
  </g>

  <!-- Right Worker -->
  <g transform="translate(600, 500)">
    <polygon points="0,-20 35,-5 0,10 -35,-5" fill="url(#workerGrad)" />
    <polygon points="-35,-5 0,10 0,25 -35,10" fill="#334155" />
    <polygon points="0,10 35,-5 35,10 0,25" fill="#1E293B" />
    <text x="45" y="5" font-family="monospace" font-size="12" fill="#94A3B8" text-anchor="start">WRKR_C</text>
  </g>

  <!-- Subtext Brand Details Label -->
  <text x="400" y="660" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#475569" letter-spacing="4" text-anchor="middle">KELLAR-STUDIO ORCHESTRATION TOPO-MAP</text>
</svg>
