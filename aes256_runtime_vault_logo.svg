<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="cryptoglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="vaultChassis" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E38" /> <stop offset="100%" stop-color="#0F172A" /> </linearGradient>
    <linearGradient id="cryptoMatrix" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" /> <stop offset="50%" stop-color="#A855F7" /> <stop offset="100%" stop-color="#10B981" /> </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <g stroke="#6366F1" stroke-width="2" opacity="0.25" fill="none" stroke-linecap="round">
    <path d="M 40,160 L 140,160 L 180,200" />
    <path d="M 40,200 L 150,200 L 180,230" />
    <path d="M 40,240 L 180,240" />
    <path d="M 40,280 L 150,280 L 180,250" />
    <path d="M 460,160 L 360,160 L 320,200" />
    <path d="M 460,200 L 350,200 L 320,230" />
    <path d="M 460,240 L 320,240" />
    <path d="M 460,280 L 350,280 L 320,250" />
  </g>
  
  <g fill="#6366F1" opacity="0.4">
    <circle cx="140" cy="160" r="3"/>
    <circle cx="150" cy="200" r="3"/>
    <circle cx="150" cy="280" r="3"/>
    <circle cx="360" cy="160" r="3"/>
    <circle cx="350" cy="200" r="3"/>
    <circle cx="350" cy="280" r="3"/>
  </g>

  <rect x="150" y="140" width="200" height="200" rx="24" fill="url(#vaultChassis)" stroke="#334155" stroke-width="4"/>
  
  <circle cx="250" cy="240" r="70" fill="none" stroke="#1E293B" stroke-width="6"/>
  <circle cx="250" cy="240" r="70" fill="none" stroke="url(#cryptoMatrix)" stroke-width="6" 
          stroke-dasharray="320" stroke-dashoffset="80" stroke-linecap="round" filter="url(#cryptoglow)"/>

  <path d="M 205,170 L 205,120 C 205,90 295,90 295,120 L 295,170" fill="none" stroke="#6366F1" stroke-width="10" stroke-linecap="round"/>
  <path d="M 205,170 L 205,120 C 205,90 295,90 295,120 L 295,170" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <g filter="url(#cryptoglow)" transform="translate(250, 240)">
    <polygon points="0,-25 22,-10 22,10 0,25 -22,10 -22,-10" fill="#090D16" stroke="#10B981" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="#10B981"/>
    <line x1="0" y1="-8" x2="0" y2="-25" stroke="#10B981" stroke-width="2"/>
    <line x1="7" y1="4" x2="18" y2="13" stroke="#10B981" stroke-width="2"/>
    <line x1="-7" y1="4" x2="-18" y2="13" stroke="#10B981" stroke-width="2"/>
  </g>

  <g transform="translate(185, 305)">
    <rect width="130" height="24" rx="4" fill="#090D16" stroke="#232934" stroke-width="1.5"/>
    <text x="65" y="16" font-family="monospace" font-size="11" font-weight="900" fill="#10B981" text-anchor="middle" letter-spacing="1">AES-256 WALLED</text>
  </g>

  <text x="135" y="380" font-family="monospace" font-size="10" font-weight="bold" fill="#64748B">STATE: ENCRYPTED</text>
  <text x="365" y="380" font-family="monospace" font-size="10" font-weight="bold" fill="#6366F1" text-anchor="end">RAM: VOLATILE</text>

  <text x="250" y="440" font-family="monospace" font-size="12" font-weight="bold" fill="#475569" letter-spacing="5" text-anchor="middle">DOTENV_VAULT // SECURITY_SYNC</text>
</svg>
