<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="crimsonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="crimsonButton" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" /> <stop offset="40%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#7F1D1D" /> </linearGradient>
    <linearGradient id="severedTrace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <polygon points="250,45 395,105 455,250 395,395 250,455 105,395 45,250 105,105" 
           fill="none" stroke="#1E293B" stroke-width="4"/>
  <polygon points="250,55 385,111 445,250 385,389 250,445 115,389 55,250 115,111" 
           fill="none" stroke="#7F1D1D" stroke-width="2" stroke-dasharray="8 6" opacity="0.6"/>

  <g stroke-width="3" stroke-linecap="round" fill="none" opacity="0.25">
    <path d="M 70,250 L 160,250" stroke="#EF4444" />
    <path d="M 90,200 L 150,230" stroke="#1E293B" />
    <path d="M 90,300 L 150,270" stroke="#1E293B" />
    <path d="M 340,250 L 430,250" stroke="#7F1D1D" stroke-dasharray="4 4" />
    <path d="M 350,230 L 410,200" stroke="#1E293B" />
    <path d="M 350,270 L 410,300" stroke="#1E293B" />
  </g>

  <circle cx="250" cy="250" r="115" fill="#0F172A" stroke="#1E293B" stroke-width="4"/>
  <circle cx="250" cy="250" r="95" fill="#090D16" stroke="#334155" stroke-width="2"/>

  <circle cx="250" cy="250" r="80" fill="url(#crimsonButton)" filter="url(#crimsonGlow)"/>
  <circle cx="250" cy="246" r="74" fill="none" stroke="#FCA5A5" stroke-width="1.5" opacity="0.4"/>

  <g fill="#090D16" transform="translate(250, 250)">
    <path d="M -15,-45 L 20,-15 L -2,-5 L 28,-5 L -5,12 L -25,2" fill="#FFFFFF" filter="url(#crimsonGlow)"/>
    <path d="M -15,-45 L 20,-15 L -2,-5 L 28,-5 L -5,12 L -25,2" fill="#090D16"/>
    
    <polygon points="-90,-12 90,18 90,4 -90,-26" fill="#090D16"/>
    <line x1="-85" y1="-16" x2="85" y2="11" stroke="#EF4444" stroke-width="3" filter="url(#crimsonGlow)"/>
    <line x1="-85" y1="-16" x2="85" y2="11" stroke="#FFFFFF" stroke-width="1" opacity="0.9"/>
  </g>

  <g transform="translate(165, 355)">
    <rect width="170" height="26" rx="5" fill="#090D16" stroke="#7F1D1D" stroke-width="1.5"/>
    <text x="85" y="17" font-family="monospace" font-size="11" font-weight="900" fill="#EF4444" text-anchor="middle" letter-spacing="1.5">SYS_ISOLATION: ARMED</text>
  </g>

  <text x="110" y="415" font-family="monospace" font-size="10" font-weight="bold" fill="#64748B">AIR_GAP: CLOSED</text>
  <text x="390" y="415" font-family="monospace" font-size="10" font-weight="bold" fill="#EF4444" text-anchor="end">SIGNAL: TERMINATED</text>

  <text x="250" y="480" font-family="monospace" font-size="12" font-weight="bold" fill="#475569" letter-spacing="5" text-anchor="middle">FAIL_SAFE // CRIMSON_KILLSWITCH</text>
</svg>
