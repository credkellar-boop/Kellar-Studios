<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="vitalsGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" /> <stop offset="40%" stop-color="#34D399" /> <stop offset="100%" stop-color="#10B981" /> </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <g stroke="#1E293B" stroke-width="1" opacity="0.25">
    <path d="M 50,150 C 150,120 200,180 250,150 C 300,120 350,180 450,150" fill="none" stroke-dasharray="4 4"/>
    <path d="M 50,300 C 150,270 200,330 250,300 C 300,270 350,330 450,300" fill="none" stroke-dasharray="4 4"/>
    <line x1="120" y1="50" x2="120" y2="400" />
    <line x1="380" y1="50" x2="380" y2="400" />
  </g>

  <g fill="none" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <path d="M 370,180 A 130,130 0 0,0 130,220" stroke="#0EA5E9" />
    <path d="M 130,260 A 130,130 0 0,0 365,260" stroke="#10B981" />
    <polygon points="130,220 136,208 122,214" fill="#0EA5E9"/>
    <polygon points="365,260 359,272 373,266" fill="#10B981" filter="url(#vitalsGlow)"/>
  </g>

  <path d="M 250,120 L 340,165 L 340,265 C 340,325 250,365 250,365 C 250,365 160,325 160,265 L 160,165 Z" 
        fill="url(#shieldFill)" stroke="#334155" stroke-width="3"/>

  <path d="M 175,240 L 205,240 L 215,190 L 225,290 L 238,210 L 250,265 L 260,240 L 325,240" 
        fill="none" stroke="url(#pulseGrad)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" filter="url(#vitalsGlow)"/>
  
  <path d="M 175,240 L 205,240 L 215,190 L 225,290 L 238,210 L 250,265 L 260,240 L 325,240" 
        fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>

  <circle cx="322" cy="240" r="4" fill="#10B981" filter="url(#vitalsGlow)"/>

  <g transform="translate(180, 315)">
    <rect width="140" height="24" rx="4" fill="#090D16" stroke="#232934" stroke-width="1.5"/>
    <text x="70" y="16" font-family="monospace" font-size="11" font-weight="900" fill="#10B981" text-anchor="middle" letter-spacing="1">HEALTH: 100%</text>
  </g>

  <text x="145" y="105" font-family="monospace" font-size="10" font-weight="bold" fill="#64748B">PREDICTIVE: SCANNING</text>
  <text x="355" y="105" font-family="monospace" font-size="10" font-weight="bold" fill="#10B981" text-anchor="end">CACHE: REHEALED</text>

  <text x="250" y="440" font-family="monospace" font-size="12" font-weight="bold" fill="#475569" letter-spacing="5" text-anchor="middle">AUTONOMIC // VITALS_MONITOR</text>
</svg>
