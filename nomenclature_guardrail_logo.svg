<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="barrierGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="laserLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857" stop-opacity="0" />
      <stop offset="15%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#34D399" />
      <stop offset="85%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <g stroke="#1E293B" stroke-width="1.5" opacity="0.25">
    <line x1="50" y1="100" x2="450" y2="100" />
    <line x1="50" y1="150" x2="450" y2="150" />
    <line x1="50" y1="200" x2="450" y2="200" />
    <line x1="50" y1="300" x2="450" y2="300" />
    <line x1="50" y1="350" x2="450" y2="350" />
    <line x1="50" y1="400" x2="450" y2="400" />
  </g>

  <path d="M250,50 L420,120 L420,300 C420,390 250,450 250,450 C250,450 80,390 80,300 L80,120 Z" 
        fill="url(#shieldGradient)" stroke="#334155" stroke-width="4"/>

  <text x="250" y="215" font-family="monospace" font-size="110" font-weight="900" fill="#1E293B" text-anchor="middle" letter-spacing="10">[  ]</text>
  
  <text x="250" y="175" font-family="monospace" font-size="20" font-weight="bold" fill="#94A3B8" text-anchor="middle" letter-spacing="4">ASSET_ID_v1_CFR</text>

  <line x1="30" y1="240" x2="470" y2="240" stroke="url(#laserLineGrad)" stroke-width="8" stroke-linecap="round" filter="url(#barrierGlow)"/>
  <line x1="60" y1="240" x2="440" y2="240" stroke="#F0FDF4" stroke-width="2" stroke-linecap="round"/>

  <path d="M200,310 L235,345 L305,265" fill="none" stroke="#10B981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#barrierGlow)"/>
  <path d="M200,310 L235,345 L305,265" fill="none" stroke="#F0FDF4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="250" y="420" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" letter-spacing="5" text-anchor="middle">NOMENCLATURE // VALIDATOR_01</text>
</svg>
