<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="chromaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="traceGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="targetBoxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <g stroke="#1E293B" stroke-width="1" fill="none">
    <circle cx="250" cy="220" r="160" stroke-width="2"/>
    <circle cx="250" cy="220" r="120" stroke-dasharray="4 6"/>
    <circle cx="250" cy="220" r="75" />
    <circle cx="250" cy="220" r="30" stroke-dasharray="2 4"/>
    
    <line x1="60" y1="220" x2="440" y2="220" stroke-width="1.5"/>
    <line x1="250" y1="30" x2="250" y2="410" stroke-width="1.5"/>
    
    <line x1="100" y1="70" x2="400" y2="370" stroke-opacity="0.5" stroke-dasharray="5 5"/>
    <line x1="100" y1="370" x2="400" y2="70" stroke-opacity="0.5" stroke-dasharray="5 5"/>
  </g>

  <g stroke="#1E293B" stroke-width="1.5" fill="none" font-family="monospace" font-size="10" font-weight="bold">
    <rect x="160" y="80" width="14" height="14" /> <text x="150" y="91" fill="#334155">R</text>
    <rect x="310" y="80" width="14" height="14" /> <text x="330" y="91" fill="#334155">Mg</text>
    <rect x="365" y="175" width="14" height="14" /> <text x="385" y="185" fill="#334155">B</text>
    <rect x="320" y="310" width="14" height="14" /> <text x="340" y="321" fill="#334155">Cy</text>
    <rect x="110" y="175" width="14" height="14" /> <text x="95" y="185" fill="#334155">Yl</text>
  </g>

  <g transform="translate(150, 290)">
    <rect x="-8" y="-8" width="36" height="36" fill="none" stroke="#10B981" stroke-width="1" opacity="0.4" stroke-dasharray="2 2"/>
    <rect x="0" y="0" width="20" height="20" fill="#090D16" stroke="url(#targetBoxGrad)" stroke-width="3" filter="url(#chromaGlow)"/>
    <text x="-16" y="14" font-family="monospace" font-size="11" font-weight="900" fill="#10B981">G</text>
  </g>

  <path d="M 250,220 Q 230,170 340,110 T 360,200 T 220,240 T 160,300" 
        fill="none" stroke="url(#traceGrad)" stroke-width="4" stroke-linecap="round" filter="url(#chromaGlow)"/>
  
  <circle cx="160" cy="300" r="5" fill="#FFFFFF" filter="url(#chromaGlow)"/>
  <circle cx="160" cy="300" r="2" fill="#10B981"/>

  <g transform="translate(155, 375)">
    <rect width="190" height="26" rx="5" fill="#0F172A" stroke="#232934" stroke-width="1.5"/>
    <text x="95" y="17" font-family="monospace" font-size="11" font-weight="900" fill="#10B981" text-anchor="middle" letter-spacing="1">ΔE COLOR MATCH: OK</text>
  </g>

  <text x="65" y="425" font-family="monospace" font-size="10" font-weight="bold" fill="#64748B">GEOMETRY: 16:9 PASS</text>
  <text x="435" y="425" font-family="monospace" font-size="10" font-weight="bold" fill="#10B981" text-anchor="end">GAMUT: REC.709 LOCK</text>

  <text x="250" y="465" font-family="monospace" font-size="12" font-weight="bold" fill="#475569" letter-spacing="5" text-anchor="middle">VECTORSCOPE // COLOR_ENFORCER</text>
</svg>
