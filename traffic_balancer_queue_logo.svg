<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="trafficGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="50%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="laneHigh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="laneMed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="laneLow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#090D16" rx="16"/>

  <g stroke="#1E293B" stroke-width="1.5" opacity="0.3">
    <line x1="80" y1="120" x2="420" y2="120" stroke-dasharray="2 4"/>
    <line x1="80" y1="210" x2="420" y2="210" />
    <line x1="80" y1="260" x2="420" y2="260" />
    <line x1="80" y1="310" x2="420" y2="310" />
    <line x1="80" y1="380" x2="420" y2="380" stroke-dasharray="2 4"/>
  </g>

  <path d="M 250,50 L 250,150" fill="none" stroke="url(#streamGrad)" stroke-width="6" stroke-linecap="round"/>
  <polygon points="250,162 256,148 244,148" fill="#34D399" filter="url(#trafficGlow)"/>

  <g transform="translate(250, 150)">
    <circle cx="0" cy="0" r="28" fill="#0F172A" stroke="#334155" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="#34D399" filter="url(#trafficGlow)"/>
    <path d="M -20,10 Q -60,40 -100,60" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
    <path d="M 0,20 Q 0,40 0,60" fill="none" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round"/>
    <path d="M 20,10 Q 60,40 100,60" fill="none" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(150, 210)">
    <rect x="-20" y="0" width="16" height="120" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <rect x="-17" y="90" width="10" height="24" rx="2" fill="url(#laneHigh)" filter="url(#trafficGlow)"/>
    <rect x="-17" y="62" width="10" height="24" rx="2" fill="url(#laneHigh)" />
    <text x="-26" y="15" font-family="monospace" font-size="10" font-weight="bold" fill="#10B981" text-anchor="end">Q_HIGH</text>
  </g>

  <g transform="translate(250, 210)">
    <rect x="-8" y="0" width="16" height="120" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <rect x="-5" y="90" width="10" height="24" rx="2" fill="url(#laneMed)" filter="url(#trafficGlow)"/>
    <rect x="-5" y="62" width="10" height="24" rx="2" fill="url(#laneMed)"/>
    <rect x="-5" y="34" width="10" height="24" rx="2" fill="url(#laneMed)" opacity="0.6"/>
    <text x="0" y="-8" font-family="monospace" font-size="10" font-weight="bold" fill="#0EA5E9" text-anchor="middle">Q_MED</text>
  </g>

  <g transform="translate(350, 210)">
    <rect x="4" y="0" width="16" height="120" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <rect x="7" y="90" width="10" height="24" rx="2" fill="url(#laneLow)"/>
    <text x="26" y="15" font-family="monospace" font-size="10" font-weight="bold" fill="#6366F1" text-anchor="start">Q_LOW</text>
  </g>

  <path d="M 130,350 C 130,380 250,380 250,400" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
  <path d="M 250,350 L 250,400" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
  <path d="M 370,350 C 370,380 250,380 250,400" fill="none" stroke="#6366F1" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
  
  <circle cx="250" cy="402" r="6" fill="#FFFFFF" filter="url(#trafficGlow)"/>

  <g transform="translate(160, 365)">
    <rect width="180" height="24" rx="4" fill="#0F172A" stroke="#232934" stroke-width="1.5"/>
    <text x="95" y="16" font-family="monospace" font-size="11" font-weight="900" fill="#10B981" text-anchor="middle" letter-spacing="1">BALANCER: STABLE</text>
  </g>

  <text x="75" y="445" font-family="monospace" font-size="10" font-weight="bold" fill="#64748B">ROUTING ENGINE: UP</text>
  <text x="425" y="445" font-family="monospace" font-size="10" font-weight="bold" fill="#10B981" text-anchor="end">THREAD CAPACITY: OPTIMAL</text>

  <text x="250" y="475" font-family="monospace" font-size="11" font-weight="bold" fill="#475569" letter-spacing="5" text-anchor="middle">QUEUE_ENGINE // LOAD_BALANCER</text>
</svg>
